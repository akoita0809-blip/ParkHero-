<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkHero - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html" style="text-decoration:none; color:#007bff;">ParkHero</a></div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="how-it-works.html">How It Works</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="login.html" class="nav-login">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="login-section">
        <div class="login-box">
            <div class="login-logo">🅿</div>
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to your ParkHero account</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%">Sign In</button>
                <p class="form-success" id="login-success">✅ Logged in successfully! Redirecting...</p>
                <p class="form-error" id="login-error">❌ Invalid email or password.</p>
            </form>
            <div class="login-links">
                <a href="#">Forgot Password?</a>
                <span>|</span>
                <a href="signup.html">Create Account</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p class="footer-copy">&copy; 2026 ParkHero. All rights reserved.</p>
    </footer>

   <script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient('https://bnlnmqbnyymbhewhbzra.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubG5tcWJueXltYmhld2hienJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTU1NjUsImV4cCI6MjA5NDE5MTU2NX0.Ymtz_tQuNdU7xQOwtLuIY5lwljXTMK4fUxNS2Qks4Yg');

    const loginForm = document.getElementById('login-form');
    if (loginForm) {
        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const successEl = document.getElementById('login-success');
            const errorEl = document.getElementById('login-error');

            const { data, error } = await client
                .from('Users')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .single();

            if (data) {
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } else {
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            }
        }, true);
    }
</script>
</body>
</html>
